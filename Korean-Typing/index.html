<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한글 키보드 연습 프로그램</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;
      background: linear-gradient(135deg, #f3f8ff, #fff7ec);
      color: #1f2937;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    header {
      background: #ffffffcc;
      border: 2px solid #dbeafe;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      color: #1d4ed8;
    }
    .subtitle {
      font-size: 18px;
      margin: 0;
      color: #4b5563;
    }
    .grid {
      display: grid;
      grid-template-columns: 310px 1fr;
      gap: 20px;
    }
    .card {
      background: #fff;
      border: 2px solid #e5e7eb;
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }
    .card h2 {
      margin-top: 0;
      font-size: 22px;
      color: #111827;
    }
    label {
      display: block;
      font-weight: 700;
      margin: 16px 0 8px;
    }
    select, textarea, input[type="text"] {
      width: 100%;
      border: 2px solid #cbd5e1;
      border-radius: 14px;
      padding: 12px;
      font-size: 17px;
      outline: none;
      background: #f8fafc;
    }
    textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.6;
    }
    select:focus, textarea:focus, input[type="text"]:focus {
      border-color: #2563eb;
      background: #fff;
    }
    .btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      border: 0;
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .08s ease, opacity .2s ease;
    }
    button:active { transform: scale(0.98); }
    .primary { background: #2563eb; color: white; }
    .secondary { background: #e0f2fe; color: #075985; }
    .danger { background: #fee2e2; color: #991b1b; }
    .success { background: #dcfce7; color: #166534; }
    .full { grid-column: 1 / -1; }
    .practice-box {
      min-height: 250px;
      border: 3px dashed #bfdbfe;
      border-radius: 22px;
      padding: 24px;
      background: #eff6ff;
      margin-bottom: 18px;
    }
    .target {
      font-size: 36px;
      line-height: 1.7;
      font-weight: 800;
      word-break: keep-all;
    }
    .char { padding: 2px 1px; border-radius: 6px; }
    .correct { background: #bbf7d0; color: #14532d; }
    .wrong { background: #fecaca; color: #7f1d1d; }
    .current { outline: 3px solid #f59e0b; background: #fef3c7; }
    .typing-input {
      font-size: 28px !important;
      padding: 18px !important;
      border-radius: 18px !important;
      background: #fff !important;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 18px 0;
    }
    .stat {
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      border-radius: 18px;
      padding: 14px;
      text-align: center;
    }
    .stat strong {
      display: block;
      font-size: 28px;
      color: #1d4ed8;
      margin-bottom: 4px;
    }
    .stat span { font-size: 14px; color: #6b7280; }
    .keyboard {
      margin-top: 18px;
      background: #f8fafc;
      border: 2px solid #e5e7eb;
      border-radius: 20px;
      padding: 14px;
    }
    .row {
      display: flex;
      justify-content: center;
      gap: 7px;
      margin: 7px 0;
    }
    .key {
      min-width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #fff;
      border: 2px solid #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #374151;
    }
    .key.active {
      background: #facc15;
      border-color: #ca8a04;
      transform: translateY(-2px);
    }
    .result {
      display: none;
      border: 3px solid #bbf7d0;
      background: #f0fdf4;
      border-radius: 22px;
      padding: 20px;
      margin-top: 18px;
    }
    .result h3 { margin-top: 0; color: #166534; font-size: 24px; }
    .small { font-size: 14px; color: #6b7280; line-height: 1.5; }
    @media (max-width: 850px) {
      .grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .target { font-size: 28px; }
      .typing-input { font-size: 23px !important; }
      .key { min-width: 34px; height: 38px; font-size: 14px; }
    }
    @media print {
      body { background: #fff; }
      .card:first-child, .keyboard, .typing-input, .btns { display: none; }
      .grid { display: block; }
      .card { box-shadow: none; border: 1px solid #000; }
      header { box-shadow: none; border: 1px solid #000; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>⌨️ 한글 키보드 연습 프로그램</h1>
      <p class="subtitle">로그인 없이 바로 실행하는 초등학생용 타자 연습</p>
    </header>

    <div class="grid">
      <section class="card">
        <h2>연습 설정</h2>

        <label for="mode">연습 종류</label>
        <select id="mode">
          <option value="basic">기초 자리 연습</option>
          <option value="word">낱말 연습</option>
          <option value="sentence">문장 연습</option>
          <option value="custom">교사가 직접 입력</option>
          <option value="question">질문 만들기 연습</option>
        </select>

        <label for="customText">교사용 입력칸</label>
        <textarea id="customText" placeholder="한 줄에 하나씩 단어나 문장을 입력하세요. 예)\n합리적 선택\n우리 지역 국가유산\n물을 아껴 써요"></textarea>
        <p class="small">※ ‘교사가 직접 입력’을 선택하면 이 칸의 내용으로 연습합니다.</p>

        <div class="btns">
          <button class="primary" onclick="startPractice()">시작하기</button>
          <button class="secondary" onclick="nextText()">다음 문제</button>
          <button class="danger" onclick="resetAll()">처음으로</button>
          <button class="success" onclick="window.print()">결과 인쇄</button>
        </div>
      </section>

      <section class="card">
        <h2>타자 연습</h2>
        <div class="practice-box">
          <div id="target" class="target">왼쪽에서 연습 종류를 고르고 시작하기를 누르세요.</div>
        </div>

        <input id="typingInput" class="typing-input" type="text" placeholder="여기에 따라 입력하세요" autocomplete="off" disabled />

        <div class="stats">
          <div class="stat"><strong id="accuracy">0%</strong><span>정확도</span></div>
          <div class="stat"><strong id="speed">0</strong><span>분당 글자 수</span></div>
          <div class="stat"><strong id="time">0초</strong><span>걸린 시간</span></div>
          <div class="stat"><strong id="score">0</strong><span>점수</span></div>
        </div>

        <div class="keyboard" aria-label="한글 키보드 안내">
          <div class="row">
            <div class="key" data-key="ㅂ">ㅂ</div><div class="key" data-key="ㅈ">ㅈ</div><div class="key" data-key="ㄷ">ㄷ</div><div class="key" data-key="ㄱ">ㄱ</div><div class="key" data-key="ㅅ">ㅅ</div><div class="key" data-key="ㅛ">ㅛ</div><div class="key" data-key="ㅕ">ㅕ</div><div class="key" data-key="ㅑ">ㅑ</div><div class="key" data-key="ㅐ">ㅐ</div><div class="key" data-key="ㅔ">ㅔ</div>
          </div>
          <div class="row">
            <div class="key" data-key="ㅁ">ㅁ</div><div class="key" data-key="ㄴ">ㄴ</div><div class="key" data-key="ㅇ">ㅇ</div><div class="key" data-key="ㄹ">ㄹ</div><div class="key" data-key="ㅎ">ㅎ</div><div class="key" data-key="ㅗ">ㅗ</div><div class="key" data-key="ㅓ">ㅓ</div><div class="key" data-key="ㅏ">ㅏ</div><div class="key" data-key="ㅣ">ㅣ</div>
          </div>
          <div class="row">
            <div class="key" data-key="ㅋ">ㅋ</div><div class="key" data-key="ㅌ">ㅌ</div><div class="key" data-key="ㅊ">ㅊ</div><div class="key" data-key="ㅍ">ㅍ</div><div class="key" data-key="ㅠ">ㅠ</div><div class="key" data-key="ㅜ">ㅜ</div><div class="key" data-key="ㅡ">ㅡ</div>
          </div>
        </div>

        <div id="result" class="result">
          <h3>연습 완료!</h3>
          <p id="resultText"></p>
          <p class="small">결과를 남기고 싶으면 ‘결과 인쇄’를 눌러 PDF로 저장할 수 있습니다.</p>
        </div>
      </section>
    </div>
  </div>

  <script>
    const basicTexts = [
      'ㄱ ㄴ ㄷ ㄹ ㅁ ㅂ ㅅ',
      'ㅇ ㅈ ㅊ ㅋ ㅌ ㅍ ㅎ',
      'ㅏ ㅑ ㅓ ㅕ ㅗ ㅛ ㅜ ㅠ ㅡ ㅣ',
      '가 나 다 라 마 바 사',
      '아 자 차 카 타 파 하'
    ];

    const wordTexts = [
      // 1단원 40% - 지도로 만나는 우리 지역
      '지도', '방위', '방위표', '기호', '범례', '축척', '등고선', '약도',
      '안내도', '노선도', '디지털 영상 지도', '위치', '지리 정보',
      '행정구역', '면적', '인구', '지형', '기온', '강수량', '우리 지역',
      '지도 읽기', '지도 활용', '공간 정보', '위치 찾기', '지도 요소',
      '항공 사진', '지형 특징', '지역 조사', '지역 정보', '상호 의존',

      // 3단원 30% - 경제활동과 지역 간 교류
      '경제활동', '지역 간 교류', '합리적 선택', '자원의 희소성',
      '선택 기준', '생산', '소비', '서비스', '상품', '예산',
      '충동 소비', '가치 소비', '경제 교류', '인적 교류', '물적 교류',
      '직거래 장터', '원산지', '지역 경제', '대표 상품', '상호 협력',

      // 2단원 30% - 우리 지역의 국가유산
      '국가유산', '문화유산', '유형유산', '무형유산', '자연유산',
      '기록유산', '미래유산', '유산 답사', '지역 탐방', '문화재',
      '보존', '전승', '역사', '전통', '공동체',
      '가치 탐구', '문화유산 해설사', '좌동 유산', '부산 유산', '미래 전달'
    ];

    const sentenceTexts = [
      // 1단원 40%
      '지도는 위에서 내려다본 땅의 모습을 일정한 약속에 따라 나타낸 것입니다.',
      '지도에는 방위와 기호, 범례, 축척과 같은 요소가 사용됩니다.',
      '방위표를 이용하면 위치와 방향을 정확하게 알 수 있습니다.',
      '범례를 읽으면 지도에 나타난 정보를 쉽게 이해할 수 있습니다.',
      '축척은 실제 거리를 얼마나 줄여 나타냈는지 알려 줍니다.',
      '등고선을 이용하면 땅의 높낮이와 지형을 알 수 있습니다.',
      '디지털 영상 지도는 우리 생활에서 편리하게 활용됩니다.',
      '행정구역을 통해 우리 지역의 위치를 확인할 수 있습니다.',
      '면적과 인구를 조사하면 지역의 특징을 이해할 수 있습니다.',
      '우리 지역의 기온과 강수량은 지역의 생활 모습에 영향을 줍니다.',
      '지도를 활용하면 원하는 장소를 쉽게 찾을 수 있습니다.',
      '지역의 지리 정보를 조사하면 우리 지역의 특징을 알 수 있습니다.',

      // 3단원 30%
      '경제활동은 생활에 필요한 물건과 서비스를 생산하고 소비하는 활동입니다.',
      '자원의 희소성 때문에 사람들은 합리적 선택을 해야 합니다.',
      '합리적 선택을 하려면 기준을 세우고 정보를 비교해야 합니다.',
      '충동 소비를 줄이기 위해 소비 계획을 세우는 것이 중요합니다.',
      '지역 간 경제 교류를 통해 사람들은 필요한 물건을 얻을 수 있습니다.',
      '우리 지역과 다른 지역은 서로 도움을 주고받으며 살아갑니다.',
      '직거래 장터에서는 생산자와 소비자가 직접 만나 거래할 수 있습니다.',
      '친환경 제품을 선택하는 것은 가치 소비의 한 모습입니다.',
      '지역의 대표 상품은 지역의 자연환경과 생활 모습을 보여 줍니다.',

      // 2단원 30%
      '국가유산은 오랫동안 전해 내려오며 가치가 있는 문화와 자연입니다.',
      '문화유산에는 유형유산과 무형유산, 자연유산이 있습니다.',
      '지역의 국가유산을 조사하면 우리 지역의 역사와 문화를 이해할 수 있습니다.',
      '국가유산은 미래 세대에게 전해 주어야 할 소중한 자산입니다.',
      '유산 답사를 통해 지역의 숨은 가치를 발견할 수 있습니다.',
      '문화유산을 보존하고 전승하려는 노력이 중요합니다.',
      '우리 지역의 유산은 공동체의 삶과 역사를 담고 있습니다.',
      '미래유산은 앞으로도 오래 기억하고 전하고 싶은 것입니다.',
      '지역의 국가유산을 아끼고 지키는 태도가 필요합니다.'
    ];

    const questionTexts = [
      // 1단원 40%
      '지도는 왜 필요할까요?',
      '방위표를 이용하면 어떤 점이 좋을까요?',
      '범례는 지도에서 어떤 역할을 할까요?',
      '축척이 다른 지도는 어떻게 다를까요?',
      '등고선을 보면 무엇을 알 수 있을까요?',
      '우리 지역의 위치는 어디에서 확인할 수 있을까요?',
      '지도를 활용했던 경험에는 어떤 것이 있나요?',
      '우리 지역의 특징은 무엇일까요?',

      // 3단원 30%
      '자원의 희소성은 왜 생길까요?',
      '합리적 선택을 하기 위해 무엇이 필요할까요?',
      '가격이 싼 물건이 언제나 좋은 선택일까요?',
      '지역 간 경제 교류가 필요한 까닭은 무엇일까요?',
      '우리 지역은 다른 지역과 무엇을 주고받고 있을까요?',
      '가치 소비는 왜 중요할까요?',

      // 2단원 30%
      '국가유산은 왜 소중할까요?',
      '우리 지역의 국가유산에는 어떤 것이 있을까요?',
      '미래 세대에게 전하고 싶은 유산은 무엇인가요?',
      '국가유산을 보존해야 하는 까닭은 무엇일까요?',
      '유산 답사를 하면 어떤 점을 알 수 있을까요?',
      '우리 지역의 미래유산으로 무엇을 추천하고 싶나요?'
    ];

    let texts = [];
    let currentIndex = 0;
    let currentText = '';
    let startTime = null;
    let timer = null;
    let finishedCount = 0;
    let totalScore = 0;
    let isComposing = false;
    let isSwitchingText = false;

    const targetEl = document.getElementById('target');
    const inputEl = document.getElementById('typingInput');
    const accuracyEl = document.getElementById('accuracy');
    const speedEl = document.getElementById('speed');
    const timeEl = document.getElementById('time');
    const scoreEl = document.getElementById('score');
    const resultEl = document.getElementById('result');
    const resultTextEl = document.getElementById('resultText');

    function startPractice() {
      const mode = document.getElementById('mode').value;
      const custom = document.getElementById('customText').value
        .split('\n')
        .map(t => t.trim())
        .filter(Boolean);

      if (mode === 'basic') texts = [...basicTexts];
      if (mode === 'word') texts = [...wordTexts];
      if (mode === 'sentence') texts = [...sentenceTexts];
      if (mode === 'custom') texts = custom.length ? custom : ['교사가 입력한 문장이 없습니다.'];
      if (mode === 'question') texts = [...questionTexts];

      currentIndex = 0;
      finishedCount = 0;
      totalScore = 0;
      scoreEl.textContent = '0';
      resultEl.style.display = 'none';
      setText(texts[currentIndex]);
    }

    function setText(text) {
      isSwitchingText = true;
      currentText = text;
      inputEl.blur();
      inputEl.value = '';
      inputEl.disabled = false;
      startTime = Date.now();
      clearInterval(timer);
      timer = setInterval(updateTimeAndSpeed, 300);
      renderTarget();
      updateStats();
      setTimeout(() => {
        inputEl.value = '';
        renderTarget();
        updateStats();
        inputEl.focus();
        isSwitchingText = false;
      }, 30);
    }

    function renderTarget() {
      const typed = inputEl.value;
      let html = '';
      for (let i = 0; i < currentText.length; i++) {
        let cls = 'char';
        if (i < typed.length) cls += typed[i] === currentText[i] ? ' correct' : ' wrong';
        if (i === typed.length) cls += ' current';
        html += `<span class="${cls}">${escapeHtml(currentText[i])}</span>`;
      }
      targetEl.innerHTML = html;
      highlightNextKey();
    }

    function updateStats() {
      const typed = inputEl.value;
      let correct = 0;
      for (let i = 0; i < typed.length; i++) {
        if (typed[i] === currentText[i]) correct++;
      }
      const accuracy = typed.length ? Math.round((correct / typed.length) * 100) : 0;
      accuracyEl.textContent = accuracy + '%';

      const elapsedMin = startTime ? Math.max((Date.now() - startTime) / 60000, 0.01) : 0.01;
      speedEl.textContent = Math.round(correct / elapsedMin);

      const score = Math.max(0, Math.round(accuracy + Math.min(100, correct * 2)));
      scoreEl.textContent = totalScore + score;
    }

    function updateTimeAndSpeed() {
      if (!startTime) return;
      const seconds = Math.floor((Date.now() - startTime) / 1000);
      timeEl.textContent = seconds + '초';
      updateStats();
    }

    function checkFinish() {
      if (inputEl.value === currentText) {
        clearInterval(timer);
        const typed = inputEl.value;
        const seconds = Math.max(1, Math.floor((Date.now() - startTime) / 1000));
        const point = Math.max(10, Math.round(100 + currentText.length * 2 - seconds));
        totalScore += point;
        finishedCount++;
        scoreEl.textContent = totalScore;

        if (currentIndex >= texts.length - 1) {
          inputEl.disabled = true;
          showResult();
        } else {
          setTimeout(nextText, 500);
        }
      }
    }

    function nextText() {
      if (!texts.length) return startPractice();
      currentIndex = (currentIndex + 1) % texts.length;
      resultEl.style.display = 'none';
      setText(texts[currentIndex]);
    }

    function showResult() {
      resultEl.style.display = 'block';
      resultTextEl.innerHTML = `총 <strong>${finishedCount}</strong>개를 연습했습니다.<br>최종 점수는 <strong>${totalScore}</strong>점입니다.<br>정확하게 끝까지 입력한 점이 훌륭합니다!`;
    }

    function resetAll() {
      clearInterval(timer);
      texts = [];
      currentText = '';
      currentIndex = 0;
      finishedCount = 0;
      totalScore = 0;
      startTime = null;
      targetEl.textContent = '왼쪽에서 연습 종류를 고르고 시작하기를 누르세요.';
      inputEl.value = '';
      inputEl.disabled = true;
      accuracyEl.textContent = '0%';
      speedEl.textContent = '0';
      timeEl.textContent = '0초';
      scoreEl.textContent = '0';
      resultEl.style.display = 'none';
      document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
    }

    function highlightNextKey() {
      document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
      const nextChar = currentText[inputEl.value.length];
      if (!nextChar) return;
      document.querySelectorAll('.key').forEach(k => {
        if (k.dataset.key === nextChar) k.classList.add('active');
      });
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;')
        .replace(/ /g, '&nbsp;');
    }

    inputEl.addEventListener('compositionstart', () => {
      isComposing = true;
    });

    inputEl.addEventListener('compositionend', () => {
      isComposing = false;
      renderTarget();
      updateStats();
      checkFinish();
    });

    inputEl.addEventListener('input', () => {
      if (isSwitchingText) {
        inputEl.value = '';
        return;
      }
      renderTarget();
      updateStats();
      if (!isComposing) checkFinish();
    });
  </script>
</body>
</html>
