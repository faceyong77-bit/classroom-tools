<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTS 포토스탠딩 활동</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap');

body{
    font-family:'Noto Sans KR',sans-serif;
    background: linear-gradient(180deg,#dbeafe,#f0f9ff,#ffffff);
    padding-bottom:120px;
}

.title-font{
    font-family:'Jua',sans-serif;
}

.card{
    background:white;
    border-radius:24px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.vts-step{
    border-left:8px solid #60a5fa;
}

.photo-border{
    border:6px dashed #93c5fd;
}

.save-bar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:white;
    box-shadow:0 -4px 20px rgba(0,0,0,0.12);
    padding:14px;
    z-index:9999;
}

.save-btn{
    border:none;
    border-radius:999px;
    padding:14px 24px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

.jpg-btn{
    background:#2563eb;
}

.pdf-btn{
    background:#db2777;
}

.reset-btn{
    background:#ef4444;
}
</style>
</head>

<body>

<div class="max-w-5xl mx-auto p-4" id="captureArea">

    <div class="text-center mb-6">
        <h1 class="title-font text-4xl text-blue-700 mb-2">
            📸 VTS 포토스탠딩 활동
        </h1>
        <p class="text-lg text-gray-700">
            그림을 보고 질문하며 생각을 확장해보세요!
        </p>
    </div>

    <div class="card mb-6">
        <h2 class="title-font text-2xl text-sky-700 mb-4">
            🖼️ 교사용 이미지 넣기
        </h2>

        <input type="file" id="imageInput" accept="image/*"
        class="block w-full text-sm text-gray-700
        file:mr-4 file:py-3 file:px-5
        file:rounded-full file:border-0
        file:text-sm file:font-semibold
        file:bg-blue-100 file:text-blue-700">
    </div>

    <div class="card mb-6">
        <div class="photo-border rounded-3xl overflow-hidden bg-slate-100 flex justify-center items-center min-h-[350px]">
            <img id="previewImage" class="max-h-[500px] object-contain hidden"/>

            <div id="emptyMessage" class="text-center p-8">
                <div class="text-6xl mb-4">🖼️</div>
                <p class="text-xl text-gray-500">
                    교사가 사진이나 그림을 넣어주세요.
                </p>
            </div>
        </div>
    </div>

    <div class="card mb-6">
        <h2 class="title-font text-3xl text-pink-600 mb-4">
            📢 포토스탠딩
        </h2>

        <div class="grid md:grid-cols-2 gap-5">
            <div>
                <label class="font-bold text-lg text-pink-700">💭 나의 주장</label>
                <textarea class="w-full mt-2 p-4 rounded-2xl border-2 border-pink-200"
                rows="5"
                placeholder="이 그림에서 가장 중요하다고 생각하는 것을 적어보세요."></textarea>
            </div>

            <div>
                <label class="font-bold text-lg text-pink-700">🔎 그렇게 생각한 이유</label>
                <textarea class="w-full mt-2 p-4 rounded-2xl border-2 border-pink-200"
                rows="5"
                placeholder="그렇게 생각한 까닭을 적어보세요."></textarea>
            </div>
        </div>
    </div>

    <div class="space-y-6">

        <div class="card vts-step">
            <h2 class="title-font text-2xl text-blue-700 mb-2">
                1단계 🔍 이 그림에서 무슨 일이 일어나고 있나요?
            </h2>

            <textarea class="w-full p-4 rounded-2xl border-2 border-blue-200"
            rows="6"
            placeholder="무슨 일이 일어나고 있는지 자유롭게 이야기해보세요."></textarea>
        </div>

        <div class="card vts-step">
            <h2 class="title-font text-2xl text-green-700 mb-2">
                2단계 🧠 무엇을 보고 그렇게 말했나요?
            </h2>

            <textarea class="w-full p-4 rounded-2xl border-2 border-green-200"
            rows="6"
            placeholder="그렇게 생각한 근거를 그림 속에서 찾아 적어보세요."></textarea>
        </div>

        <div class="card vts-step">
            <h2 class="title-font text-2xl text-orange-700 mb-2">
                3단계 🌟 또 무엇을 더 찾을 수 있나요?
            </h2>

            <textarea class="w-full p-4 rounded-2xl border-2 border-orange-200"
            rows="6"
            placeholder="새롭게 발견한 점이나 다른 생각을 적어보세요."></textarea>
        </div>
    </div>

</div>

<div class="save-bar flex justify-center gap-3 flex-wrap">
    <button onclick="saveJPG()" class="save-btn jpg-btn">
        🖼️ 학습 결과물 JPG 저장하기
    </button>

    <button onclick="savePDF()" class="save-btn pdf-btn">
        📄 학습 결과물 PDF 저장하기
    </button>

    <button onclick="resetAll()" class="save-btn reset-btn">
        🔄 처음부터 다시
    </button>
</div>

<script>
const imageInput = document.getElementById('imageInput');
const previewImage = document.getElementById('previewImage');
const emptyMessage = document.getElementById('emptyMessage');

imageInput.addEventListener('change', function(event){
    const file = event.target.files[0];

    if(file){
        const reader = new FileReader();

        reader.onload = function(e){
            previewImage.src = e.target.result;
            previewImage.classList.remove('hidden');
            emptyMessage.classList.add('hidden');
        }

        reader.readAsDataURL(file);
    }
});

function resetAll(){
    location.reload();
}

async function saveJPG(){
    const captureArea = document.getElementById('captureArea');

    const canvas = await html2canvas(captureArea,{
        scale:2,
        useCORS:true
    });

    const link = document.createElement('a');
    link.download = 'VTS포토스탠딩.jpg';
    link.href = canvas.toDataURL('image/jpeg',1.0);
    link.click();
}

async function savePDF(){
    const captureArea = document.getElementById('captureArea');

    const canvas = await html2canvas(captureArea,{
        scale:2,
        useCORS:true
    });

    const imgData = canvas.toDataURL('image/png');

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF('p','mm','a4');

    const pdfWidth = 210;
    const pdfHeight = canvas.height * pdfWidth / canvas.width;

    pdf.addImage(imgData,'PNG',0,0,pdfWidth,pdfHeight);
    pdf.save('VTS포토스탠딩.pdf');
}
</script>

</body>
</html>
