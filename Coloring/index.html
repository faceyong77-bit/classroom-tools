<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이미지 컬러링 학습지 만들기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(251, 191, 36, .25), transparent 30%),
        radial-gradient(circle at bottom right, rgba(96, 165, 250, .25), transparent 32%),
        #f8fafc;
    }

    .title-font { font-family: 'Jua', sans-serif; }

    .worksheet {
      width: 794px;
      min-height: 1123px;
      background: white;
      margin: 0 auto;
      box-shadow: 0 20px 50px rgba(15, 23, 42, .16);
    }

    canvas {
      max-width: 100%;
      background: white;
      border-radius: 20px;
    }

    .print-line {
      border-bottom: 2px solid #d1d5db;
      min-height: 34px;
    }

    @media print {
      body { background: white; }
      .no-print { display: none !important; }
      .worksheet { box-shadow: none; width: 100%; min-height: auto; }
    }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8">
  <div class="max-w-6xl mx-auto no-print">
    <div class="bg-white rounded-3xl shadow-xl p-5 md:p-7 mb-6 border border-slate-100">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h1 class="title-font text-3xl md:text-4xl text-slate-800">🎨 이미지 컬러링 학습지 만들기</h1>
          <p class="text-slate-600 mt-2">사진이나 그림을 올리면 색칠하기 학습지처럼 흑백 선화로 바꿔 줍니다.</p>
        </div>
        <div class="flex gap-2 flex-wrap">
          <button onclick="downloadImage()" class="px-5 py-3 rounded-2xl bg-emerald-500 text-white font-bold shadow hover:bg-emerald-600">🖼️ JPG 저장</button>
          <button onclick="window.print()" class="px-5 py-3 rounded-2xl bg-indigo-500 text-white font-bold shadow hover:bg-indigo-600">🖨️ 인쇄/PDF</button>
          <button onclick="resetAll()" class="px-5 py-3 rounded-2xl bg-slate-700 text-white font-bold shadow hover:bg-slate-800">↺ 처음부터</button>
        </div>
      </div>

      <div class="grid md:grid-cols-3 gap-4 mt-6">
        <label class="block bg-amber-50 rounded-2xl p-4 border-2 border-amber-200 cursor-pointer">
          <span class="font-black text-amber-800">1. 이미지 올리기</span>
          <input id="imageInput" type="file" accept="image/*" class="mt-3 block w-full text-sm" />
        </label>

        <div class="bg-sky-50 rounded-2xl p-4 border-2 border-sky-200">
          <label class="font-black text-sky-800">2. 선 굵기</label>
          <input id="lineStrength" type="range" min="1" max="5" value="3" class="w-full mt-3" />
          <p class="text-xs text-sky-700 mt-1">높일수록 선이 진해집니다.</p>
        </div>

        <div class="bg-violet-50 rounded-2xl p-4 border-2 border-violet-200">
          <label class="font-black text-violet-800">3. 밝기</label>
          <input id="brightness" type="range" min="0" max="80" value="30" class="w-full mt-3" />
          <p class="text-xs text-violet-700 mt-1">높일수록 배경이 더 하얗게 됩니다.</p>
        </div>
      </div>

      <div class="grid md:grid-cols-4 gap-3 mt-5">
        <input id="schoolInput" class="rounded-2xl border p-3" placeholder="학교/학년반 예: 좌산초 4-1" oninput="syncText()" />
        <input id="nameInput" class="rounded-2xl border p-3" placeholder="이름" oninput="syncText()" />
        <input id="topicInput" class="rounded-2xl border p-3" placeholder="학습 주제" oninput="syncText()" />
        <input id="dateInput" type="date" class="rounded-2xl border p-3" oninput="syncText()" />
      </div>
    </div>
  </div>

  <main id="worksheet" class="worksheet rounded-3xl overflow-hidden">
    <section class="p-10">
      <div class="border-4 border-slate-800 rounded-3xl p-6">
        <div class="text-center">
          <div class="inline-block px-5 py-2 rounded-full bg-slate-800 text-white font-black mb-3">컬러링 학습지</div>
          <h2 id="topicTitle" class="title-font text-4xl text-slate-900">이미지를 올려 주세요</h2>
          <div class="flex justify-between text-slate-700 font-bold mt-5 text-sm md:text-base">
            <span id="schoolText">학교/학년반: __________</span>
            <span id="nameText">이름: __________</span>
            <span id="dateText">날짜: __________</span>
          </div>
        </div>

        <div class="mt-8 border-4 border-dashed border-slate-300 rounded-3xl p-4 min-h-[540px] flex items-center justify-center bg-white">
          <canvas id="coloringCanvas" width="640" height="520"></canvas>
          <div id="emptyGuide" class="absolute text-center text-slate-400 pointer-events-none">
            <div class="text-6xl mb-3">🖼️</div>
            <p class="font-black text-xl">위에서 이미지를 올리면<br/>색칠하기 그림으로 바뀝니다.</p>
          </div>
        </div>

        <div class="mt-8 grid grid-cols-1 gap-5">
          <div>
            <p class="font-black text-slate-800 mb-2">🌈 색칠하며 떠오른 생각을 써 봅시다.</p>
            <div class="print-line"></div>
            <div class="print-line"></div>
          </div>
          <div>
            <p class="font-black text-slate-800 mb-2">💬 이 그림을 친구에게 소개한다면?</p>
            <div class="print-line"></div>
            <div class="print-line"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const input = document.getElementById('imageInput');
    const canvas = document.getElementById('coloringCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const guide = document.getElementById('emptyGuide');
    const lineStrength = document.getElementById('lineStrength');
    const brightness = document.getElementById('brightness');
    let originalImage = null;

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    clearCanvas();

    input.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          originalImage = img;
          makeColoringPage();
          guide.style.display = 'none';
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    lineStrength.addEventListener('input', makeColoringPage);
    brightness.addEventListener('input', makeColoringPage);

    function makeColoringPage() {
      if (!originalImage) return;
      clearCanvas();

      const maxW = canvas.width;
      const maxH = canvas.height;
      const ratio = Math.min(maxW / originalImage.width, maxH / originalImage.height);
      const w = originalImage.width * ratio;
      const h = originalImage.height * ratio;
      const x = (maxW - w) / 2;
      const y = (maxH - h) / 2;

      ctx.drawImage(originalImage, x, y, w, h);

      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;
      const gray = new Uint8ClampedArray(canvas.width * canvas.height);

      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i + 1], b = data[i + 2];
        gray[i / 4] = 0.299 * r + 0.587 * g + 0.114 * b;
      }

      const output = ctx.createImageData(canvas.width, canvas.height);
      const out = output.data;
      const strength = Number(lineStrength.value) * 18;
      const bright = Number(brightness.value);

      for (let yy = 1; yy < canvas.height - 1; yy++) {
        for (let xx = 1; xx < canvas.width - 1; xx++) {
          const idx = yy * canvas.width + xx;
          const gx =
            -gray[idx - canvas.width - 1] - 2 * gray[idx - 1] - gray[idx + canvas.width - 1] +
             gray[idx - canvas.width + 1] + 2 * gray[idx + 1] + gray[idx + canvas.width + 1];
          const gy =
            -gray[idx - canvas.width - 1] - 2 * gray[idx - canvas.width] - gray[idx - canvas.width + 1] +
             gray[idx + canvas.width - 1] + 2 * gray[idx + canvas.width] + gray[idx + canvas.width + 1];

          let edge = Math.sqrt(gx * gx + gy * gy);
          let color = 255 - Math.min(255, edge + strength);

          if (gray[idx] > 245 - bright) color = 255;
          if (color > 210) color = 255;
          if (color < 170) color = 25;

          const oi = idx * 4;
          out[oi] = color;
          out[oi + 1] = color;
          out[oi + 2] = color;
          out[oi + 3] = 255;
        }
      }

      ctx.putImageData(output, 0, 0);
      thickenLines(Number(lineStrength.value));
    }

    function thickenLines(times) {
      if (times <= 1) return;
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = img.data;
      const copy = new Uint8ClampedArray(data);
      const radius = times >= 4 ? 1 : 0;
      if (radius === 0) return;

      for (let y = 1; y < canvas.height - 1; y++) {
        for (let x = 1; x < canvas.width - 1; x++) {
          const idx = (y * canvas.width + x) * 4;
          if (copy[idx] < 100) {
            for (let dy = -1; dy <= 1; dy++) {
              for (let dx = -1; dx <= 1; dx++) {
                const ni = ((y + dy) * canvas.width + (x + dx)) * 4;
                data[ni] = data[ni + 1] = data[ni + 2] = 35;
                data[ni + 3] = 255;
              }
            }
          }
        }
      }
      ctx.putImageData(img, 0, 0);
    }

    function syncText() {
      const school = document.getElementById('schoolInput').value.trim() || '__________';
      const name = document.getElementById('nameInput').value.trim() || '__________';
      const topic = document.getElementById('topicInput').value.trim() || '이미지 컬러링 학습지';
      const date = document.getElementById('dateInput').value || '__________';

      document.getElementById('schoolText').textContent = `학교/학년반: ${school}`;
      document.getElementById('nameText').textContent = `이름: ${name}`;
      document.getElementById('topicTitle').textContent = topic;
      document.getElementById('dateText').textContent = `날짜: ${date}`;
    }

    async function downloadImage() {
      const target = document.getElementById('worksheet');
      const canvasImage = await html2canvas(target, {
        scale: 2,
        backgroundColor: '#ffffff',
        useCORS: true
      });
      const link = document.createElement('a');
      link.download = '컬러링_학습지.jpg';
      link.href = canvasImage.toDataURL('image/jpeg', 0.95);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function resetAll() {
      document.getElementById('imageInput').value = '';
      document.getElementById('schoolInput').value = '';
      document.getElementById('nameInput').value = '';
      document.getElementById('topicInput').value = '';
      document.getElementById('dateInput').value = '';
      lineStrength.value = 3;
      brightness.value = 30;
      originalImage = null;
      guide.style.display = 'block';
      clearCanvas();
      syncText();
    }
  </script>
</body>
</html>
