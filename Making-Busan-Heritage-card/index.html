  if(n.includes('철새')) return '🕊️';
  if(n.includes('야류')) return '🎭';
  if(n.includes('어방') || n.includes('후리')) return '🎣';
  if(n.includes('오륙도')) return '🏝️';
  if(n.includes('패총')) return '🐚';
  if(n.includes('대통령')) return '🏛️';
  if(n.includes('태종대') || n.includes('동백섬')) return '🌊';
  if(t.includes('무형')) return '🎭';
  if(t.includes('자연')) return '🌿';
  return '⭐';
}
function setMiniArt(h){
  const icon=heritageIcon(h), name=h?.name||'국가유산';
  const arts=[
    `<div class="miniArt scene1"><span class="spark s1">✨</span><span class="spark s2">📜</span><span class="mainIcon">${icon}</span><span class="tinyName">옛이야기 속 ${name}</span></div>`,
    `<div class="miniArt scene2"><span class="spark s1">🔍</span><span class="spark s2">💡</span><span class="mainIcon">${icon}</span><span class="tinyName">살펴보고 배우는 ${name}</span></div>`,
    `<div class="miniArt scene3"><span class="spark s1">💚</span><span class="spark s2">🌈</span><span class="mainIcon">${icon}</span><span class="tinyName">미래로 전할 ${name}</span></div>`
  ];
  ['mini1','mini2','mini3'].forEach((id,i)=>{ const el=$(id); el.style.backgroundImage='none'; el.innerHTML=arts[i]; });
}
function updateCard(){ const h = HERITAGES[Number($('heritageSelect').value)] || HERITAGES[0]; const img = h.img; $('frontCard').style.backgroundImage=`url(${img})`; setMiniArt(h); $('selectedThumb').src=img; $('topOut').textContent=$('topText').value; $('nameOut').textContent=$('heritageName').value; $('typeOut').textContent=$('heritageType').value; $('infoOut').textContent=$('infoText').value; $('backTitle').textContent=$('heritageName').value+'의 가치'; $('v1Out').textContent=$('v1').value; $('v2Out').textContent=$('v2').value; $('v3Out').textContent=$('v3').value; $('finalOut').textContent=$('finalText').value; $('studentOut').textContent=$('studentName').value || ' '; }
async function savePDF(){ const s=$('saving'); s.style.display='flex'; try{ const { jsPDF } = window.jspdf; const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'}); const cards=[$('frontCard'),$('backCard')]; for(let i=0;i<cards.length;i++){ const canvas=await html2canvas(cards[i],{scale:2,useCORS:true,backgroundColor:'#ffffff'}); const data=canvas.toDataURL('image/jpeg',0.95); if(i>0) pdf.addPage('a4','landscape'); pdf.addImage(data,'JPEG',0,0,297,210); } const name=($('heritageName').value||'부산의 국가유산').replace(/[\/:*?"<>|]/g,''); pdf.save(name+'_소개카드.pdf'); } catch(e){ alert('PDF 저장 중 오류가 났습니다. 인쇄 창으로 저장을 이용해 주세요.'); console.error(e); } finally{ s.style.display='none'; } }
window.addEventListener('DOMContentLoaded',()=>{ fillSelect(); $('heritageSelect').addEventListener('change',e=>applyHeritage(e.target.value)); ['heritageName','heritageType','topText','infoText','v1','v2','v3','finalText','studentName'].forEach(id=>$(id).addEventListener('input',updateCard)); applyHeritage(0); });
</script></body></html>
