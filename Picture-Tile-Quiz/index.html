<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그림 타일 맞히기 프로그램</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Pretendard', 'Noto Sans KR', Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #fef3c7);
      color: #1f2937;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: min(1180px, 100%);
      background: rgba(255, 255, 255, 0.96);
      border: 4px solid #c7d2fe;
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 24px 70px rgba(67, 56, 202, 0.18);
    }

    .header { text-align: center; margin-bottom: 22px; }

    .badge {
      display: inline-block;
      background: #4f46e5;
      color: white;
      padding: 8px 18px;
      border-radius: 999px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 58px);
      color: #3730a3;
      line-height: 1.15;
    }

    .subtitle {
      margin: 10px 0 0;
      color: #6b7280;
      font-size: clamp(17px, 2vw, 23px);
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      align-items: start;
    }

    .panel {
      background: #f8fafc;
      border: 2px solid #c7d2fe;
      border-radius: 22px;
      padding: 20px;
    }

    label {
      display: block;
      font-size: 16px;
      color: #3730a3;
      font-weight: 900;
      margin: 14px 0 8px;
    }

    input[type="file"], input[type="text"], select {
      width: 100%;
      border: 3px solid #a5b4fc;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 17px;
      font-weight: 700;
      background: white;
      outline: none;
      font-family: inherit;
    }

    input[type="file"] { font-size: 15px; }

    input:focus, select:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 5px rgba(79, 70, 229, 0.16);
    }

    .quiz-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .quiz-tab {
      background: #e0e7ff;
      color: #3730a3;
      border: 2px solid #a5b4fc;
      padding: 11px 8px;
      font-size: 15px;
    }

    .quiz-tab.active {
      background: #4f46e5;
      color: white;
      border-color: #3730a3;
    }

    .button-grid, .nav-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .nav-grid { margin-top: 10px; }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 12px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      font-family: inherit;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(55, 48, 163, 0.18);
    }

    button:active { transform: translateY(0); }

    .primary { background: #4f46e5; color: white; }
    .yellow { background: #facc15; color: #713f12; }
    .green { background: #dcfce7; color: #166534; }
    .gray { background: #e5e7eb; color: #374151; }
    .red { background: #fee2e2; color: #991b1b; }

    .status-card {
      margin-top: 18px;
      background: #eef2ff;
      border-radius: 18px;
      padding: 16px;
      color: #312e81;
      font-weight: 900;
      line-height: 1.7;
      text-align: center;
      font-size: 18px;
    }

    .answer-box {
      margin-top: 14px;
      background: #fffbeb;
      border-left: 8px solid #facc15;
      border-radius: 16px;
      padding: 14px;
      color: #713f12;
      font-size: 16px;
      line-height: 1.6;
      font-weight: 700;
    }

    .game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .question-title {
      width: 100%;
      text-align: center;
      background: #eef2ff;
      color: #3730a3;
      border: 2px solid #c7d2fe;
      border-radius: 22px;
      padding: 16px;
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 1000;
    }

    .board-wrap {
      width: min(720px, 100%);
      aspect-ratio: var(--image-ratio, 4 / 3);
      position: relative;
      border-radius: 26px;
      overflow: hidden;
      background: white;
      border: 6px solid #3730a3;
      box-shadow: 0 20px 45px rgba(49, 46, 129, 0.22);
    }

    .image-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: white;
      z-index: 1;
    }

    .tile-grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr);
      z-index: 2;
    }

    .tile {
      border: 2px solid rgba(255, 255, 255, 0.82);
      background: linear-gradient(135deg, #4f46e5, #818cf8);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(22px, 4vw, 42px);
      font-weight: 1000;
      cursor: pointer;
      user-select: none;
      transition: transform 0.18s ease, opacity 0.22s ease, background 0.18s ease;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .tile:hover {
      background: linear-gradient(135deg, #4338ca, #6366f1);
      transform: scale(0.96);
    }

    .tile.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.78);
    }

    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
      color: #6b7280;
      font-size: clamp(22px, 3vw, 36px);
      font-weight: 900;
      z-index: 1;
      background: white;
    }

    .guess-row {
      width: min(720px, 100%);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .guess-result {
      min-height: 44px;
      text-align: center;
      font-size: clamp(20px, 3vw, 32px);
      font-weight: 1000;
      color: #3730a3;
    }

    .guide {
      margin-top: 18px;
      background: #fefce8;
      border-left: 8px solid #eab308;
      border-radius: 16px;
      padding: 14px 16px;
      color: #713f12;
      font-size: 15.5px;
      line-height: 1.65;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      body { padding: 12px; }
      .app { padding: 18px; }
      .layout { grid-template-columns: 1fr; }
      .panel { order: 2; }
      .game-area { order: 1; }
      .guess-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <div class="badge">수업 흥미 유발 · 그림 맞히기</div>
      <h1>25칸 타일 그림 퀴즈</h1>
      <p class="subtitle">3문제를 차례대로 풀어 보세요!</p>
    </section>

    <section class="layout">
      <aside class="panel">
        <div class="quiz-tabs">
          <button id="tab0" class="quiz-tab active" onclick="switchQuiz(0)">1번 문제</button>
          <button id="tab1" class="quiz-tab" onclick="switchQuiz(1)">2번 문제</button>
          <button id="tab2" class="quiz-tab" onclick="switchQuiz(2)">3번 문제</button>
        </div>

        <label for="imageInput">현재 문제 사진 넣기</label>
        <input id="imageInput" type="file" accept="image/*" />

        <label for="questionInput">현재 문제 제목</label>
        <input id="questionInput" type="text" value="무엇일까요?" placeholder="예: 이 국가유산은 무엇일까요?" />

        <label for="answerInput">현재 문제 정답</label>
        <input id="answerInput" type="text" placeholder="예: 해운대 석각, 국가유산, 장산" />

        <label for="tileStyleSelect">타일 모양</label>
        <select id="tileStyleSelect">
          <option value="number" selected>번호 보이기</option>
          <option value="question">? 표시</option>
          <option value="blank">글자 없음</option>
        </select>

        <div class="button-grid">
          <button class="primary" onclick="resetTiles()">다시 가리기</button>
          <button class="yellow" onclick="revealRandomTile()">무작위 열기</button>
          <button class="green" onclick="showAnswer()">정답 보기</button>
          <button class="red" onclick="hideAnswer()">정답 숨기기</button>
          <button class="gray" onclick="revealAllTiles()">전체 공개</button>
          <button class="gray" onclick="hideAllTiles()">전체 가리기</button>
        </div>

        <div class="nav-grid">
          <button class="gray" onclick="prevQuiz()">이전 문제</button>
          <button class="primary" onclick="nextQuiz()">다음 문제</button>
        </div>

        <div class="status-card">
          현재 문제: <span id="quizNumber">1</span> / 3<br />
          열린 타일: <span id="openedCount">0</span> / 25<br />
          남은 타일: <span id="leftCount">25</span>개
        </div>

        <div class="answer-box" id="answerBox">정답은 아직 숨겨져 있습니다.</div>

        <div class="guide">
          <strong>사용 방법</strong><br />
          ① 1번·2번·3번 문제를 선택합니다. ② 각 문제마다 사진, 문제 제목, 정답을 넣습니다. ③ 학생이 번호를 고르거나 교사가 타일을 클릭합니다. ④ 타일이 사라지며 그림 일부가 공개됩니다.<br />
          <strong>팁:</strong> 전자칠판에서는 F11을 눌러 전체화면으로 사용하면 좋습니다.
        </div>
      </aside>

      <section class="game-area">
        <div class="question-title" id="questionTitle">1번 문제: 무엇일까요?</div>

        <div class="board-wrap">
          <img id="quizImage" class="image-layer" alt="퀴즈 이미지" />
          <div id="placeholder" class="placeholder">1번 문제 사진을 넣어주세요.</div>
          <div id="tileGrid" class="tile-grid"></div>
        </div>

        <div class="guess-row">
          <input id="guessInput" type="text" placeholder="학생 정답을 입력해 확인할 수 있어요." />
          <button class="primary" onclick="checkGuess()">정답 확인</button>
        </div>

        <div id="guessResult" class="guess-result"></div>
      </section>
    </section>
  </main>

  <script>
    const imageInput = document.getElementById('imageInput');
    const questionInput = document.getElementById('questionInput');
    const answerInput = document.getElementById('answerInput');
    const tileStyleSelect = document.getElementById('tileStyleSelect');
    const questionTitle = document.getElementById('questionTitle');
    const quizImage = document.getElementById('quizImage');
    const placeholder = document.getElementById('placeholder');
    const tileGrid = document.getElementById('tileGrid');
    const boardWrap = document.querySelector('.board-wrap');
    const openedCount = document.getElementById('openedCount');
    const leftCount = document.getElementById('leftCount');
    const answerBox = document.getElementById('answerBox');
    const guessInput = document.getElementById('guessInput');
    const guessResult = document.getElementById('guessResult');
    const quizNumber = document.getElementById('quizNumber');

    let currentQuizIndex = 0;
    const quizzes = [
      { image: '', ratio: 4 / 3, question: '무엇일까요?', answer: '', revealed: Array(25).fill(false) },
      { image: '', ratio: 4 / 3, question: '무엇일까요?', answer: '', revealed: Array(25).fill(false) },
      { image: '', ratio: 4 / 3, question: '무엇일까요?', answer: '', revealed: Array(25).fill(false) }
    ];

    let revealed = quizzes[currentQuizIndex].revealed;

    function normalize(text) {
      return text.replace(/\s/g, '').toLowerCase();
    }

    function saveCurrentQuizInputs() {
      quizzes[currentQuizIndex].question = questionInput.value.trim() || '무엇일까요?';
      quizzes[currentQuizIndex].answer = answerInput.value.trim();
      quizzes[currentQuizIndex].revealed = revealed;
    }

    function loadCurrentQuiz() {
      const quiz = quizzes[currentQuizIndex];
      revealed = quiz.revealed;

      questionInput.value = quiz.question;
      answerInput.value = quiz.answer;
      questionTitle.textContent = `${currentQuizIndex + 1}번 문제: ${quiz.question || '무엇일까요?'}`;
      quizNumber.textContent = currentQuizIndex + 1;
      guessInput.value = '';
      guessResult.textContent = '';
      hideAnswer();

      if (quiz.image) {
        quizImage.src = quiz.image;
        boardWrap.style.setProperty('--image-ratio', quiz.ratio);
        placeholder.style.display = 'none';
      } else {
        quizImage.removeAttribute('src');
        boardWrap.style.setProperty('--image-ratio', quiz.ratio || 4 / 3);
        placeholder.style.display = 'flex';
        placeholder.textContent = `${currentQuizIndex + 1}번 문제 사진을 넣어주세요.`;
      }

      document.querySelectorAll('.quiz-tab').forEach((tab, index) => {
        tab.classList.toggle('active', index === currentQuizIndex);
      });

      updateTiles();
    }

    function switchQuiz(index) {
      saveCurrentQuizInputs();
      currentQuizIndex = index;
      loadCurrentQuiz();
    }

    function prevQuiz() {
      saveCurrentQuizInputs();
      currentQuizIndex = (currentQuizIndex + 2) % 3;
      loadCurrentQuiz();
    }

    function nextQuiz() {
      saveCurrentQuizInputs();
      currentQuizIndex = (currentQuizIndex + 1) % 3;
      loadCurrentQuiz();
    }

    function createTiles() {
      tileGrid.innerHTML = '';
      for (let i = 0; i < 25; i++) {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.dataset.index = i;
        tile.textContent = getTileText(i);
        tile.addEventListener('click', () => revealTile(i));
        tileGrid.appendChild(tile);
      }
      updateTiles();
    }

    function getTileText(index) {
      const style = tileStyleSelect.value;
      if (style === 'number') return index + 1;
      if (style === 'question') return '?';
      return '';
    }

    function updateTiles() {
      const tiles = document.querySelectorAll('.tile');
      let count = 0;

      tiles.forEach((tile, index) => {
        tile.textContent = getTileText(index);
        if (revealed[index]) {
          tile.classList.add('hidden');
          count++;
        } else {
          tile.classList.remove('hidden');
        }
      });

      openedCount.textContent = count;
      leftCount.textContent = 25 - count;
    }

    function revealTile(index) {
      revealed[index] = true;
      quizzes[currentQuizIndex].revealed = revealed;
      updateTiles();
    }

    function resetTiles() {
      revealed = Array(25).fill(false);
      quizzes[currentQuizIndex].revealed = revealed;
      guessResult.textContent = '';
      hideAnswer();
      updateTiles();
    }

    function hideAllTiles() {
      revealed = Array(25).fill(false);
      quizzes[currentQuizIndex].revealed = revealed;
      updateTiles();
    }

    function revealAllTiles() {
      revealed = Array(25).fill(true);
      quizzes[currentQuizIndex].revealed = revealed;
      updateTiles();
    }

    function revealRandomTile() {
      const hiddenIndexes = revealed
        .map((isOpen, index) => isOpen ? null : index)
        .filter(index => index !== null);

      if (hiddenIndexes.length === 0) {
        guessResult.textContent = '모든 타일이 열렸습니다!';
        return;
      }

      const randomIndex = hiddenIndexes[Math.floor(Math.random() * hiddenIndexes.length)];
      revealTile(randomIndex);
    }

    function showAnswer() {
      saveCurrentQuizInputs();
      const answer = quizzes[currentQuizIndex].answer;
      answerBox.textContent = answer ? `정답: ${answer}` : '정답이 입력되지 않았습니다.';
    }

    function hideAnswer() {
      answerBox.textContent = '정답은 아직 숨겨져 있습니다.';
    }

    function checkGuess() {
      saveCurrentQuizInputs();
      const answer = normalize(quizzes[currentQuizIndex].answer);
      const guess = normalize(guessInput.value);

      if (!answer) {
        guessResult.textContent = '먼저 정답을 입력해주세요.';
        return;
      }

      if (!guess) {
        guessResult.textContent = '학생 정답을 입력해주세요.';
        return;
      }

      if (guess === answer) {
        guessResult.textContent = '정답입니다! 🎉';
        revealAllTiles();
        showAnswer();
      } else {
        guessResult.textContent = '아직 아니에요. 타일을 조금 더 열어볼까요?';
      }
    }

    imageInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        quizImage.onload = () => {
          const ratio = quizImage.naturalWidth / quizImage.naturalHeight;
          quizzes[currentQuizIndex].image = e.target.result;
          quizzes[currentQuizIndex].ratio = ratio;
          boardWrap.style.setProperty('--image-ratio', ratio);
          placeholder.style.display = 'none';
          resetTiles();
        };
        quizImage.src = e.target.result;
      };
      reader.readAsDataURL(file);
      imageInput.value = '';
    });

    questionInput.addEventListener('input', () => {
      quizzes[currentQuizIndex].question = questionInput.value.trim() || '무엇일까요?';
      questionTitle.textContent = `${currentQuizIndex + 1}번 문제: ${quizzes[currentQuizIndex].question}`;
    });

    answerInput.addEventListener('input', () => {
      quizzes[currentQuizIndex].answer = answerInput.value.trim();
      hideAnswer();
    });

    tileStyleSelect.addEventListener('change', updateTiles);

    guessInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') checkGuess();
    });

    createTiles();
    loadCurrentQuiz();
  </script>
</body>
</html>
